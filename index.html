<!DOCTYPE html>
<html>
<head>
    <title>Domain Reputation Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container py-5">

    <h1 class="text-center mb-4">
        Domain Reputation Dashboard
    </h1>

    <ul class="nav nav-tabs mb-4">

        <li class="nav-item">
            <button class="nav-link active"
                    data-bs-toggle="tab"
                    data-bs-target="#domainTab">
                Domain Check
            </button>
        </li>

        <li class="nav-item">
            <button class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#ipTab">
                Single IP
            </button>
        </li>

        <li class="nav-item">
            <button class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#bulkTab">
                Bulk IP
            </button>
        </li>

    </ul>

    <div class="tab-content">

        <div class="tab-pane fade show active" id="domainTab">

            <div class="card shadow p-4">

                <input
                    id="domainInput"
                    class="form-control mb-3"
                    placeholder="example.com">

                <button
                    class="btn btn-primary"
                    onclick="checkDomain()">
                    Check Domain
                </button>

            </div>

            <div id="domainResults" class="mt-4"></div>

        </div>

        <div class="tab-pane fade" id="ipTab">

            <div class="card shadow p-4">

                <input
                    id="ipInput"
                    class="form-control mb-3"
                    placeholder="45.205.67.136">

                <button
                    class="btn btn-success"
                    onclick="checkIP()">
                    Check IP
                </button>

            </div>

            <div id="ipResults" class="mt-4"></div>

        </div>

        <div class="tab-pane fade" id="bulkTab">

            <div class="card shadow p-4">

                <input
                    id="cidrInput"
                    class="form-control mb-3"
                    placeholder="45.205.67.0/24">

                <button
                    class="btn btn-danger"
                    onclick="bulkScan()">
                    Scan Range
                </button>

            </div>

            <div id="bulkResults" class="mt-4"></div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/static/script.js"></script>

</body>
</html>

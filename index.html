<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reputation Checker Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0b1220;
    color: #fff;
    font-family: Arial;
}

.container {
    margin-top: 30px;
}

.card {
    background: #111827;
    border: none;
    border-radius: 12px;
    padding: 15px;
    margin-top: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

input {
    background: #1f2937 !important;
    color: white !important;
    border: 1px solid #374151 !important;
}

button {
    width: 100%;
}

.tab-btn {
    background: #1f2937;
    color: white;
    border: none;
    padding: 10px;
    margin-right: 5px;
    border-radius: 8px;
}

.tab-btn.active {
    background: #3b82f6;
}

.status-good { color: #22c55e; }
.status-bad { color: #ef4444; }
.status-warn { color: #f59e0b; }

table {
    color: white;
}
</style>
</head>

<body>

<div class="container">

<h2 class="text-center mb-4">Domain Reputation Dashboard</h2>

<!-- TABS -->
<div class="text-center mb-3">
    <button class="tab-btn active" onclick="showTab('domain')">Domain Check</button>
    <button class="tab-btn" onclick="showTab('ip')">Single IP</button>
    <button class="tab-btn" onclick="showTab('bulk')">Bulk IP</button>
</div>

<!-- DOMAIN -->
<div id="domainTab">
    <input id="domainInput" class="form-control mb-2" placeholder="Enter domain">
    <button class="btn btn-primary" onclick="checkDomain()">Check Domain</button>
    <div id="domainResults"></div>
</div>

<!-- IP -->
<div id="ipTab" style="display:none;">
    <input id="ipInput" class="form-control mb-2" placeholder="Enter IP">
    <button class="btn btn-primary" onclick="checkIP()">Check IP</button>
    <div id="ipResults"></div>
</div>

<!-- BULK -->
<div id="bulkTab" style="display:none;">
    <input id="cidrInput" class="form-control mb-2" placeholder="Enter CIDR (e.g. 192.168.0.0/24)">
    <button class="btn btn-primary" onclick="bulkScan()">Bulk Scan</button>
    <div id="bulkResults"></div>
</div>

</div>

<script src="/static/script.js"></script>

<script>
function showTab(tab){
    document.getElementById("domainTab").style.display = tab==="domain"?"block":"none";
    document.getElementById("ipTab").style.display = tab==="ip"?"block":"none";
    document.getElementById("bulkTab").style.display = tab==="bulk"?"block":"none";

    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Domain Reputation Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

    <h1>Domain Reputation Dashboard</h1>

    <button onclick="toggleTheme()" class="btn">Toggle Theme</button>

    <div class="tabs">
        <button onclick="showTab('domain')" class="tab">Domain</button>
        <button onclick="showTab('ip')" class="tab">Single IP</button>
        <button onclick="showTab('bulk')" class="tab">Bulk IP</button>
    </div>

    <!-- DOMAIN -->
    <div id="domain" class="section active">

        <input id="domainInput" placeholder="Enter domain">
        <button class="btn" onclick="checkDomain()">Check</button>

        <div id="domainResults"></div>
    </div>

    <!-- IP -->
    <div id="ip" class="section">

        <input id="ipInput" placeholder="Enter IP">
        <button class="btn" onclick="checkIP()">Check</button>

        <div id="ipResults"></div>
    </div>

    <!-- BULK -->
    <div id="bulk" class="section">

        <input id="cidrInput" placeholder="CIDR e.g. 94.183.242.0/24">
        <button class="btn" onclick="bulkScan()">Scan</button>

        <div id="bulkResults"></div>
    </div>

</div>

<script src="/static/script.js"></script>

<script>
function showTab(id){

    document.querySelectorAll(".section")
        .forEach(e => e.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Domain Reputation Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="topbar">
    <h2>Domain Reputation Dashboard</h2>

    <button onclick="toggleTheme()" class="themeBtn">
        Toggle Theme
    </button>
</div>

<!-- NAV TABS -->
<div class="tabs">
    <button onclick="showTab('domain')" class="tab active">Domain Check</button>
    <button onclick="showTab('ip')" class="tab">Single IP</button>
    <button onclick="showTab('bulk')" class="tab">Bulk IP</button>
</div>

<!-- DOMAIN -->
<div id="domain" class="tabContent active">

    <input id="domainInput" placeholder="Enter domain">
    <button onclick="checkDomain()">Check Domain</button>

    <div id="domainResults"></div>
</div>

<!-- IP -->
<div id="ip" class="tabContent">

    <input id="ipInput" placeholder="Enter IP">
    <button onclick="checkIP()">Check IP</button>

    <div id="ipResults"></div>
</div>

<!-- BULK -->
<div id="bulk" class="tabContent">

    <input id="cidrInput" placeholder="Enter CIDR (e.g. 94.183.242.0/24)">
    <button onclick="bulkScan()">Scan Range</button>

    <div id="bulkResults"></div>
</div>

<script src="/static/script.js"></script>

<script>
function showTab(id){

    document.querySelectorAll(".tabContent")
        .forEach(el => el.classList.remove("active"));

    document.querySelectorAll(".tab")
        .forEach(el => el.classList.remove("active"));

    document.getElementById(id).classList.add("active");

    event.target.classList.add("active");
}
</script>

</body>
</html>
